name = "meteo-rappel-aeration"
main = "worker.ts"
compatibility_date = "2024-09-23"

# Permet `import PAGE_HTML from "./index.html"` (HTML servi comme texte).
[[rules]]
type = "Text"
globs = ["**/*.html"]

[triggers]
crons = ["*/15 * * * *"]   # toutes les 15 min (96/jour, large dans le tier gratuit)

[[kv_namespaces]]
binding = "ETAT_METEO"
id = "REMPLACE_PAR_TON_ID_KV"

# MOT_DE_PASSE : ne pas mettre ici -> secret (voir étape 4 ci-dessous).
# La position et les seuils se règlent désormais dans la page, pas dans ce fichier.
